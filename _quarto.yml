format:
  html:
    theme:
      light: default
      dark: darkly
    css: styles.css
    include-in-header:
      - text: |
          <script>
          /* Anti-FOUC: apply quarto-dark class before first paint */
          (function() {
            var stored = localStorage.getItem('quarto-color-scheme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
              document.body && document.body.classList.add('quarto-dark');
              document.documentElement.classList.add('quarto-dark');
            }
          })();

          /* Scroll progress bar */
          let ticking = false;
          document.addEventListener("scroll", () => {
            if (!ticking) {
              requestAnimationFrame(() => {
                const scrollTop = document.documentElement.scrollTop;
                const height =
                  document.documentElement.scrollHeight -
                  document.documentElement.clientHeight;
                const scroll = height > 0 ? scrollTop / height : 0;
                document.body.style.setProperty("--scroll", scroll);
                ticking = false;
              });
              ticking = true;
            }
          });
          </script>
    toc: true
    number-sections: true
    search: true
    page-navigation: true
